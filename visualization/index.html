<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stack &amp; Queue Visualizer</title>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", -apple-system, sans-serif;
    background: #f4efe6;
    color: #1d2a3a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background-image:
      radial-gradient(circle at 8% 12%, rgba(36,87,165,0.06) 0%, transparent 42%),
      radial-gradient(circle at 92% 88%, rgba(242,140,40,0.08) 0%, transparent 36%);
  }
  :root {
    --paper: #f6f1e8;
    --panel: #fffaf2;
    --ink: #1d2a3a;
    --muted: #6a7484;
    --line: #dccfb9;
    --cobalt: #2457a5;
    --cobalt-soft: #dfeafb;
    --mint: #1f8c71;
    --mint-soft: #dbf3ec;
    --orange: #f28c28;
    --orange-soft: #ffe7cf;
    --rose: #c95852;
    --rose-soft: #f7ddd9;
    --shadow: rgba(76,55,22,0.12);
    --radius: 28px;
    --radius-sm: 18px;
  }

  /* ===== CONTAINER ===== */
  .app {
    width: 100%;
    max-width: 100%;
    min-height: 100vh;
    background: var(--panel);
    box-shadow: 0 24px 64px var(--shadow);
    overflow: hidden;
    backdrop-filter: blur(2px);
  }

  /* ===== HEADER ===== */
  .header {
    padding: 32px 40px 20px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-left h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header-left p {
    font-size: 16px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.4;
  }
  .header-badge {
    padding: 10px 20px;
    border-radius: 999px;
    background: var(--cobalt);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 0 40px;
    background: #fcf8f2;
    border-bottom: 1px solid var(--line);
  }
  .tab {
    padding: 14px 28px;
    border: none;
    background: transparent;
    font-size: 16px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    transition: all 0.2s;
    position: relative;
    font-family: inherit;
  }
  .tab:hover { color: var(--ink); background: rgba(0,0,0,0.02); }
  .tab.active {
    color: var(--ink);
    background: var(--panel);
    box-shadow: 0 -2px 0 var(--cobalt);
  }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 20%; right: 20%;
    height: 3px;
    background: var(--cobalt);
    border-radius: 3px 3px 0 0;
  }
  .tab .icon { margin-right: 8px; }

  /* ===== MAIN CONTENT ===== */
  .content { display: none; padding: 28px 40px 32px; gap: 28px; }
  .content.active { display: flex; flex-wrap: wrap; }

  /* ===== VIZ PANEL ===== */
  .viz-panel {
    flex: 1.3;
    min-width: 480px;
    background: #fcf8f2;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    padding: 28px;
    position: relative;
    overflow: hidden;
  }
  .viz-panel::before {
    content: '';
    position: absolute; inset: 0;
    opacity: 0.4;
    background:
      radial-gradient(circle at 12% 20%, rgba(36,87,165,0.06) 0%, transparent 40%),
      radial-gradient(circle at 88% 80%, rgba(242,140,40,0.07) 0%, transparent 34%);
    pointer-events: none;
  }
  .viz-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.7px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
  }
  .viz-title .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
  }
  .queue-view-toggle {
    margin-left: auto;
    display: inline-flex;
    gap: 6px;
    padding: 4px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.58);
  }
  .view-toggle-btn {
    border: none;
    border-radius: 7px;
    padding: 6px 10px;
    background: transparent;
    color: var(--muted);
    font: inherit;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
  }
  .view-toggle-btn.active {
    background: var(--mint-soft);
    color: var(--mint);
  }

  /* ===== ARRAY CELLS ===== */
  .array-container {
    position: relative;
    display: flex;
    gap: 10px;
    justify-content: center;
    padding: 20px 0 40px;
  }
  .array-container.vertical {
    flex-direction: column-reverse;
    align-items: center;
    padding: 36px 20px;
  }
  .array-container.vertical .cell {
    width: 100px;
    height: 56px;
  }
  .array-container.vertical .cell .index {
    bottom: auto;
    left: auto;
    right: -34px;
    top: 50%;
    transform: translateY(-50%);
  }
  .cell {
    width: 80px;
    height: 100px;
    border-radius: var(--radius-sm);
    background: var(--panel);
    border: 2px solid var(--line);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    box-shadow: 0 4px 12px rgba(76,55,22,0.06);
  }
  .cell .value {
    font-size: 32px;
    font-weight: 700;
    font-family: "Iowan Old Style", "Georgia", serif;
    transition: all 0.3s;
  }
  .cell .index {
    font-size: 12px;
    color: var(--muted);
    position: absolute;
    bottom: -26px;
    font-family: "SFMono-Regular", "Menlo", monospace;
    font-weight: 600;
  }
  .cell.empty { background: #f1ece1; border-color: #e0d6c4; }
  .cell.empty .value { color: #c4b9a5; font-size: 20px; }
  .cell.active {
    border-color: var(--cobalt);
    background: var(--cobalt-soft);
    transform: scale(1.04);
    box-shadow: 0 8px 24px rgba(36,87,165,0.18);
  }
  .cell.pushing {
    border-color: var(--orange);
    background: var(--orange-soft);
    transform: scale(1.06);
    box-shadow: 0 10px 30px rgba(242,140,40,0.22);
  }
  .cell.pushing .value { color: var(--orange); }
  .cell.popping {
    border-color: var(--rose);
    background: var(--rose-soft);
    transform: scale(0.92);
    filter: saturate(60%);
    box-shadow: 0 4px 12px rgba(201,88,82,0.14);
  }
  .cell.enqueueing {
    border-color: var(--mint);
    background: var(--mint-soft);
    transform: scale(1.06);
    box-shadow: 0 10px 30px rgba(31,140,113,0.22);
  }
  .cell.enqueueing .value { color: var(--mint); }
  .cell.dequeueing {
    border-color: var(--rose);
    background: var(--rose-soft);
    transform: scale(0.92);
    filter: saturate(60%);
  }
  .cell.removed {
    transform: scale(0.7);
    opacity: 0;
  }
  .cell.dimmed {
    border-color: var(--rose);
    background: var(--rose-soft);
    filter: saturate(60%);
    box-shadow: 0 4px 12px rgba(201,88,82,0.1);
  }
  .cell.dimmed .value { color: var(--rose); }
  .array-container.circular {
    min-height: 340px;
    padding: 28px 0 44px;
    align-items: center;
    overflow: visible;
  }
  .cells-ring {
    position: relative;
    width: min(320px, 72vw);
    aspect-ratio: 1;
    margin: 0 auto;
    border: 2px dashed rgba(35,132,111,0.28);
    border-radius: 50%;
    background:
      radial-gradient(circle, rgba(35,132,111,0.08) 0 34%, transparent 35%),
      radial-gradient(circle, transparent 0 64%, rgba(35,132,111,0.04) 65% 100%);
  }
  .cells-ring::after {
    content: "↻";
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: rgba(35,132,111,0.42);
    font-size: 54px;
    font-weight: 800;
    line-height: 1;
  }
  .array-container.circular .cell {
    position: absolute;
    left: var(--x);
    top: var(--y);
    width: 86px;
    height: 76px;
    border-radius: 18px;
    transform: translate(-50%, -50%);
    z-index: 2;
  }
  .array-container.circular .cell .index {
    left: 50%;
    right: auto;
    bottom: -24px;
    transform: translateX(-50%);
  }
  .array-container.circular .cell.active {
    transform: translate(-50%, -50%) scale(1.04);
  }
  .array-container.circular .cell.pushing,
  .array-container.circular .cell.enqueueing {
    transform: translate(-50%, -50%) scale(1.06);
  }
  .array-container.circular .cell.popping,
  .array-container.circular .cell.dequeueing {
    transform: translate(-50%, -50%) scale(0.92);
  }

  /* ===== POINTER OVERLAY ===== */
  .pointer-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }
  .ptr-group {
    position: absolute;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: left 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.3s ease;
    z-index: 10;
    opacity: 0;
    animation: ptrAppear 0.3s ease forwards;
  }
  @keyframes ptrAppear {
    from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  .ptr-group .ptr-arrow {
    font-size: 22px;
    line-height: 1;
    text-shadow: 0 2px 8px rgba(0,0,0,0.08);
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.06));
  }
  .ptr-group .ptr-label {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 12px;
    border-radius: 999px;
    white-space: nowrap;
    color: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    margin-top: 2px;
    letter-spacing: 0.3px;
  }
  .ptr-group.cobalt .ptr-arrow { color: var(--cobalt); }
  .ptr-group.cobalt .ptr-label { background: var(--cobalt); }
  .ptr-group.orange .ptr-arrow { color: var(--orange); }
  .ptr-group.orange .ptr-label { background: var(--orange); }
  .ptr-group.rose .ptr-arrow { color: var(--rose); }
  .ptr-group.rose .ptr-label { background: var(--rose); }
  .ptr-group.mint .ptr-arrow { color: var(--mint); }
  .ptr-group.mint .ptr-label { background: var(--mint); }

  /* bottom-positioned pointer (for rear) */
  .ptr-group.bottom {
    flex-direction: column-reverse;
  }
  .ptr-group.bottom .ptr-label {
    margin-top: 0;
    margin-bottom: 2px;
  }
  .ptr-group.bottom .ptr-arrow {
    transform: rotate(180deg);
  }

  /* right-positioned pointer (for vertical stack) */
  .ptr-group.right {
    flex-direction: row;
    align-items: center;
  }
  .ptr-group.right .ptr-label {
    margin-top: 0;
    margin-right: 6px;
  }
  .ptr-group.right .ptr-arrow {
    font-size: 26px;
  }
  .ptr-group.circular {
    transform: translate(-50%, -50%);
    animation: none;
    opacity: 1;
    gap: 3px;
    z-index: 5;
  }
  .ptr-group.circular .ptr-label {
    border-radius: 14px;
    box-shadow: 0 8px 18px rgba(31,44,67,0.13);
  }
  .ptr-group.circular .ptr-arrow {
    font-size: 24px;
    transform: rotate(var(--arrow-rotation));
    line-height: 1;
    text-shadow: 0 2px 6px rgba(31,44,67,0.12);
  }

  /* ===== CAPACITY LABEL ===== */
  .capacity-label {
    text-align: center;
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.4px;
  }
  .capacity-label span { font-weight: 700; }

  /* ===== INFO BANNER ===== */
  .info-banner {
    margin-top: 16px;
    padding: 16px 20px;
    border-radius: var(--radius-sm);
    background: var(--panel);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 14px;
    min-height: 60px;
    transition: all 0.3s;
  }
  .info-banner .step-tag {
    padding: 4px 12px;
    border-radius: 999px;
    background: var(--cobalt);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }
  .info-banner .msg {
    font-size: 15px;
    line-height: 1.5;
    color: var(--ink);
  }
  .info-banner .msg .hl {
    font-weight: 700;
    color: var(--cobalt);
  }

  /* ===== CODE PANEL ===== */
  .code-panel {
    flex: 0.9;
    min-width: 360px;
    background: var(--panel);
    border-radius: var(--radius);
    border: 1px solid var(--line);
    box-shadow: 0 8px 28px var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .code-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .code-header h3 {
    font-size: 16px;
    font-weight: 700;
  }
  .code-header .line-indicator {
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    font-size: 13px;
    color: var(--muted);
    font-family: "SFMono-Regular", "Menlo", monospace;
    background: #fcf8f2;
    transition: all 0.3s;
  }
  .code-body {
    padding: 16px 20px;
    font-family: "SFMono-Regular", "Menlo", "Courier New", monospace;
    font-size: 14px;
    line-height: 1.7;
    overflow-x: auto;
    flex: 1;
    background: #fcf8f2;
  }
  .code-line {
    display: grid;
    grid-template-columns: 48px 1fr;
    padding: 3px 8px;
    border-radius: 10px;
    transition: all 0.2s;
    white-space: pre;
  }
  .code-line .num {
    color: #b0a898;
    font-size: 12px;
    user-select: none;
    text-align: right;
    padding-right: 12px;
  }
  .code-line.highlight {
    background: var(--cobalt-soft);
    border-left: 3px solid var(--cobalt);
  }
  .code-line.highlight .num { color: var(--cobalt); font-weight: 700; }
  .code-line.highlight .code { color: var(--ink); font-weight: 600; }

  /* ===== CONTROLS ===== */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 20px;
    align-items: center;
  }
  .btn {
    padding: 10px 22px;
    border: none;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-primary { background: var(--cobalt); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #1b4a8a; box-shadow: 0 4px 16px rgba(36,87,165,0.3); }

  .btn-orange { background: var(--orange); color: #fff; }
  .btn-orange:hover:not(:disabled) { background: #d97a1e; box-shadow: 0 4px 16px rgba(242,140,40,0.3); }

  .btn-rose { background: var(--rose); color: #fff; }
  .btn-rose:hover:not(:disabled) { background: #b14a44; box-shadow: 0 4px 16px rgba(201,88,82,0.3); }

  .btn-mint { background: var(--mint); color: #fff; }
  .btn-mint:hover:not(:disabled) { background: #18755c; box-shadow: 0 4px 16px rgba(31,140,113,0.3); }

  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--line);
    color: var(--muted);
  }
  .btn-outline:hover:not(:disabled) { border-color: var(--ink); color: var(--ink); }
  .btn-outline.active { border-color: var(--cobalt); color: var(--cobalt); background: var(--cobalt-soft); }

  .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }

  /* Input inline */
  .value-input {
    width: 52px;
    padding: 8px 8px;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    font-family: inherit;
    background: var(--panel);
    transition: border-color 0.2s;
    outline: none;
  }
  .value-input:focus { border-color: var(--cobalt); }

  /* ===== PROGRESS BAR ===== */
  .progress-bar {
    display: flex;
    gap: 6px;
    margin-top: 20px;
    align-items: center;
  }
  .progress-step {
    flex: 1;
    height: 10px;
    border-radius: 999px;
    background: #e5dcca;
    transition: all 0.3s;
  }
  .progress-step.done { background: var(--cobalt); }
  .progress-step.current {
    background: var(--orange);
    box-shadow: 0 0 0 3px var(--orange-soft);
  }
  .progress-label {
    font-size: 13px;
    color: var(--muted);
    margin-left: 8px;
    white-space: nowrap;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 960px) {
    .content.active { flex-direction: column; }
    .viz-panel, .code-panel { min-width: 0; width: 100%; }
    .header { padding: 24px; }
    .tabs { padding: 0 24px; }
    .content { padding: 20px 24px; }
    .cell { width: 64px; height: 84px; }
    .cell .value { font-size: 26px; }
  }
  @media (max-width: 600px) {
    .header-left h1 { font-size: 24px; }
    .tab { padding: 12px 16px; font-size: 14px; }
    .cell { width: 48px; height: 68px; }
    .cell .value { font-size: 20px; }
    .cell .index { font-size: 10px; bottom: -22px; }
    .array-container { gap: 6px; }
    .controls { flex-direction: column; align-items: stretch; }
    .btn-group { justify-content: center; }
    .btn { justify-content: center; }
  }

  /* ===== TOAST / NOTIFICATION ===== */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    padding: 14px 28px;
    border-radius: 999px;
    background: var(--ink);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-8px); }
</style>
</head>
<body>

<div class="app" role="main">
  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <h1>Stack &amp; Queue · 算法可视化</h1>
      <p>逐行高亮 Java 源代码，直观展示数组实现的栈与队列内部运作</p>
    </div>
    <div class="header-badge">CS 教学演示</div>
  </header>

  <!-- TABS -->
  <nav class="tabs" role="tablist">
    <button class="tab active" data-tab="stack" role="tab" aria-selected="true">
      <span class="icon">▦</span>ArrayStack
    </button>
    <button class="tab" data-tab="queue" role="tab" aria-selected="false">
      <span class="icon">◧</span>ArrayQueue
    </button>
  </nav>

  <!-- ===== STACK TAB ===== -->
  <div class="content active" id="tab-stack" role="tabpanel">
    <div class="viz-panel">
      <div class="viz-title">
        <span class="status-dot" style="background:var(--cobalt)"></span>
        数组内部状态
        <span style="font-weight:400;color:var(--muted);font-size:13px;letter-spacing:0;">
          — 栈顶指针 <strong style="color:var(--cobalt)">top</strong> 指向最后一个元素
        </span>
      </div>

      <div class="array-container vertical" id="stack-array"></div>

      <div class="capacity-label">
        capacity = <span id="stack-cap">8</span>
      </div>

      <div class="info-banner" id="stack-info">
        <span class="step-tag" id="stack-step-tag">就绪</span>
        <span class="msg" id="stack-msg">点击 Push 或 Pop 开始演示</span>
      </div>

      <div class="controls">
        <div class="btn-group">
          <button class="btn btn-primary" id="stack-push-btn" title="将值压入栈顶">Push</button>
          <input type="number" class="value-input" id="stack-input" value="42" min="-999" max="999">
          <button class="btn btn-orange" id="stack-pop-btn" title="弹出栈顶元素">Pop</button>
          <button class="btn btn-outline" id="stack-peek-btn" title="查看栈顶元素（不移除）">Peek</button>
          <button class="btn btn-outline" id="stack-reset-btn" title="重置栈到初始状态">↺ Reset</button>
        </div>
        <div class="btn-group" role="group" aria-label="Stack playback mode">
          <button class="btn btn-outline" id="stack-auto-mode-btn" title="自动播放，每步停留 1.5 秒">Auto 1.5s</button>
          <button class="btn btn-outline active" id="stack-manual-mode-btn" title="手动逐步执行">Step</button>
        </div>
        <div class="btn-group">

<script>
// ============================================================
//  Java Source Code
// ============================================================
const STACK_CODE = [
  'public class ArrayStack {',
  '    static final int CAPACITY = 4;',
  '    int top;',
  '    int stack[];',

  '        return element;',

  '',

  '    }',

];

const QUEUE_CODE = [
  'public class ArrayQueue {',
  '    int front, rear, size;',
  '    int capacity;',
  '    int array[];',
  '',
  '    public ArrayQueue(int capacity) {',
  '        this.capacity = capacity;',
  '        front = rear = size = 0;',
  '        array = new int[capacity];',
  '    }',
  '',
  '    public void enqueue(int item) {',
  '        if (isFull()) return;',
  '        array[rear] = item;',
  '        rear = (rear + 1) % capacity;',
  '        size++;',
  '        System.out.println(item + " enqueued.");',
  '    }',
  '',
  '    public int dequeue() {',
  '        if (isEmpty())',
  '            return Integer.MIN_VALUE;',
  '        int item = array[front];',
  '        front = (front + 1) % capacity;',
  '        size--;',
  '        return item;',
  '    }',
  '',

];

// ============================================================
//  Step Engine
// ============================================================
const AUTO_STEP_DELAY_MS = 1500;

class StepEngine {
  constructor() {
    this.steps = [];
    this.current = -1;
    this.listeners = [];
  }

  load(steps) {
    this.steps = steps;
    this.current = -1;
    this.notify();
  }

  next() {
    if (this.current < this.steps.length - 1) {
      this.current++;
      const step = this.currentStep();
      if (step && step.action) step.action();
      this.notify();
      return step;
    }
    return null;
  }

  back() {
    if (this.current >= 0) {
      // revert the current step's action
      const step = this.steps[this.current];
      if (step.revert) step.revert();
      this.current--;
      this.notify();
      return this.currentStep();
    }
    return null;
  }

  currentStep() {
    return this.current >= 0 && this.current < this.steps.length
      ? this.steps[this.current] : null;
  }

  hasNext() { return this.current < this.steps.length - 1; }
  hasPrev() { return this.current >= 0; }
  totalSteps() { return this.steps.length; }
  currentIndex() { return this.current; }

  onNotify(fn) { this.listeners.push(fn); }
  notify() { this.listeners.forEach(fn => fn(this)); }

  reset() {
    this.current = -1;
    this.notify();
  }

  runAndReset(steps) {
    this.load(steps);
    // auto-advance with delay
    let i = 0;
    const tick = () => {
      if (i < steps.length) {
        this.next();
        i++;
        setTimeout(tick, AUTO_STEP_DELAY_MS);
      }
    };
    tick();
  }
}

// ============================================================
//  Stack Logic
// ============================================================
const STACK_CAPACITY = 4;

function createStack() {
  return {
    array: new Array(STACK_CAPACITY).fill(null),
    removed: new Set(),
    top: -1,
    capacity: STACK_CAPACITY,
  };
}

function generateStackPushSteps(stack, val) {
  const steps = [];

  steps.push({
    lines: [12],
    desc: `执行 if (top >= (CAPACITY - 1))：top(${stack.top}) >= ${STACK_CAPACITY - 1}？`,
    tag: '条件判断',
    action: () => {},
    revert: () => {},
  });

  if (stack.top >= STACK_CAPACITY - 1) {
    steps.push({
      lines: [13, 14],
      desc: `条件为 true：输出 "Stack Overflow."，然后 return false。`,
      tag: '溢出',
      action: () => showToast('Stack Overflow! 栈已满。'),
      revert: () => {},
    });
    return steps;
  }

  const targetIndex = stack.top + 1;
  const previousVal = stack.array[targetIndex];
  const wasRemoved = stack.removed.has(targetIndex);

  steps.push({
    lines: [16],
    desc: `执行 stack[++top] = ${val} → top 自增为 ${targetIndex}，将 ${val} 存入 array[${targetIndex}]`,
    tag: '写入',
    action: () => {
      stack.top++;
      stack.array[stack.top] = val;
      stack.removed.delete(stack.top);
    },
    revert: () => {
      stack.array[targetIndex] = previousVal;
      if (wasRemoved) stack.removed.add(targetIndex);
      else stack.removed.delete(targetIndex);
      stack.top--;
    },
    animCell: targetIndex,
    animType: 'pushing',
  });

  steps.push({
    lines: [17],
    desc: `返回 true，表示压栈成功。`,
    tag: '返回',
    action: () => {},
    revert: () => {},
  });

  return steps;
}

function generateStackPopSteps(stack) {
  const steps = [];

  steps.push({
    lines: [21],
    desc: `执行 if (top < 0)：top(${stack.top}) < 0？`,
    tag: '条件判断',
    action: () => {},
    revert: () => {},
  });

  if (stack.top < 0) {
    steps.push({
      lines: [22, 23],
      desc: '条件为 true：输出 "Stack Underflow."，然后 return 0。',
      tag: '下溢',
      action: () => showToast('Stack Underflow! 栈已为空。'),
      revert: () => {},
    });
    return steps;
  }

  const popIndex = stack.top;
  const poppedVal = stack.array[popIndex];
  const wasRemoved = stack.removed.has(popIndex);

  steps.push({
    lines: [25],
    desc: `执行 int element = stack[top--] → element = ${poppedVal}，top 从 ${popIndex} 减为 ${popIndex - 1}`,
    tag: '读取',
    action: () => {
      stack.removed.add(popIndex);
      stack.top--;
    },
    revert: () => {
      stack.top++;
      stack.array[popIndex] = poppedVal;
      if (wasRemoved) stack.removed.add(popIndex);
      else stack.removed.delete(popIndex);
    },
    animCell: popIndex,
    animType: 'popping',
    popVal: poppedVal,
  });

  steps.push({
    lines: [26],
    desc: `返回 element = ${poppedVal}，弹出成功。`,
    tag: '返回',
    action: () => {},
    revert: () => {},
    popVal: poppedVal,
  });

  return steps;
}

function generateStackPeekSteps(stack) {
  const steps = [];

  steps.push({
    lines: [30],
    desc: `执行 if (top < 0)：top(${stack.top}) < 0？`,
    tag: '条件判断',
    action: () => {},
    revert: () => {},
  });

  if (stack.top < 0) {
    steps.push({
      lines: [31, 32],
      desc: '条件为 true：输出 "Stack Underflow"，然后 return 0。',
      tag: '下溢',
      action: () => showToast('Stack Underflow! 栈已为空。'),
      revert: () => {},
    });
    return steps;
  }

  const peekVal = stack.array[stack.top];

  steps.push({
    lines: [34],
    desc: `执行 int element = stack[top]：stack[${stack.top}] = ${peekVal}`,
    tag: '读取',
    action: () => {},
    revert: () => {},
    animCell: stack.top,
    animType: 'active',
    peekVal,
  });

  steps.push({
    lines: [35],
    desc: `返回 element = ${peekVal}`,
    tag: '返回',
    action: () => {},
    revert: () => {},
    peekVal,
  });

  return steps;
}

// ============================================================
//  Queue Logic
// ============================================================
const QUEUE_CAPACITY = 4;

function createQueue() {
  return {
    array: new Array(QUEUE_CAPACITY).fill(null),
    removed: new Set(),
    front: 0,
    rear: 0,
    size: 0,
    capacity: QUEUE_CAPACITY,
  };
}

function generateQueueEnqSteps(queue, val) {
  const steps = [];

  steps.push({
    lines: [13],
    desc: `执行 if (isFull()) return;：size(${queue.size}) == capacity(${queue.capacity})？`,
    tag: '条件判断',
    action: () => {},
    revert: () => {},
  });

  if (queue.size >= queue.capacity) {
    steps.push({
      lines: [13],
      desc: 'isFull() 为 true，直接 return。',
      tag: '满',
      action: () => showToast('Queue Full! 队列已满。'),
      revert: () => {},
    });
    return steps;
  }

  const enqueueIndex = queue.rear;
  const previousVal = queue.array[enqueueIndex];
  const wasRemoved = queue.removed.has(enqueueIndex);

  steps.push({
    lines: [14],
    desc: `执行 array[rear] = item：array[${enqueueIndex}] = ${val}`,
    tag: '写入',
    action: () => {
      queue.array[enqueueIndex] = val;
      queue.removed.delete(enqueueIndex);
    },
    revert: () => {
      queue.array[enqueueIndex] = previousVal;
      if (wasRemoved) queue.removed.add(enqueueIndex);
      else queue.removed.delete(enqueueIndex);
    },
    animCell: enqueueIndex,
    animType: 'enqueueing',
  });

  const oldRear = queue.rear;
  const newRear = (queue.rear + 1) % queue.capacity;
  steps.push({
    lines: [15],
    desc: `执行 rear = (rear + 1) % capacity：(${oldRear} + 1) % ${queue.capacity} = ${newRear}`,
    tag: '移动',
    action: () => {
      queue.rear = newRear;
    },
    revert: () => {
      queue.rear = oldRear;
    },
  });

  steps.push({
    lines: [16],
    desc: `执行 size++：${queue.size} → ${queue.size + 1}`,
    tag: '计数',
    action: () => { queue.size++; },
    revert: () => { queue.size--; },
  });

  steps.push({
    lines: [17],
    desc: `执行输出：${val} enqueued.`,
    tag: '输出',
    action: () => {},
    revert: () => {},
  });

  return steps;
}

function generateQueueDeqSteps(queue) {
  const steps = [];

  steps.push({
    lines: [21],
    desc: `执行 if (isEmpty())：size(${queue.size}) == 0？`,
    tag: '条件判断',
    action: () => {},
    revert: () => {},
  });

  if (queue.size === 0) {
    steps.push({
      lines: [22],
      desc: 'isEmpty() 为 true，返回 Integer.MIN_VALUE。',
      tag: '下溢',
      action: () => showToast('Queue Underflow! 队列已为空。'),
      revert: () => {},
    });
    return steps;
  }

  const deqVal = queue.array[queue.front];
  const oldFront = queue.front;
  const newFront = (queue.front + 1) % queue.capacity;
  const wasRemoved = queue.removed.has(oldFront);

  steps.push({
    lines: [23],
    desc: `执行 int item = array[front]：array[${oldFront}] = ${deqVal}`,
    tag: '读取',
    action: () => {},
    revert: () => {},
    animCell: oldFront,
    animType: 'dequeueing',
    deqVal,
  });

  steps.push({
    lines: [24],
    desc: `执行 front = (front + 1) % capacity：(${oldFront} + 1) % ${queue.capacity} = ${newFront}`,
    tag: '移动',
    action: () => {
      queue.removed.add(oldFront);
      queue.front = newFront;
    },
    revert: () => {
      queue.front = oldFront;
      queue.array[oldFront] = deqVal;
      if (wasRemoved) queue.removed.add(oldFront);
      else queue.removed.delete(oldFront);
    },
  });

  steps.push({
    lines: [25],
    desc: `执行 size--：${queue.size} → ${queue.size - 1}`,
    tag: '计数',
    action: () => { queue.size--; },
    revert: () => { queue.size++; },
  });

  steps.push({
    lines: [26],
    desc: `返回 item = ${deqVal}`,
    tag: '返回',
    action: () => {},
    revert: () => {},
    deqVal,
  });

  return steps;
}

function generateQueuePeekSteps(queue) {
  const steps = [];

  steps.push({
    lines: [30],
    desc: `执行 if (isEmpty())：size(${queue.size}) == 0？`,
    tag: '条件判断',
    action: () => {},
    revert: () => {},
  });

  if (queue.size === 0) {
    steps.push({
      lines: [31],
      desc: 'isEmpty() 为 true，返回 Integer.MIN_VALUE。',
      tag: '下溢',
      action: () => showToast('Queue Empty!'),
      revert: () => {},
    });
    return steps;
  }

  const peekVal = queue.array[queue.front];

  steps.push({
    lines: [32],
    desc: `执行 return array[front]：array[${queue.front}] = ${peekVal}`,
    tag: '读取',
    action: () => {},
    revert: () => {},
    animCell: queue.front,
    animType: 'active',
    peekVal,
  });

  return steps;
}

function renderCode(containerId, codeLines, highlightLines) {
  const container = document.getElementById(containerId);
  container.innerHTML = codeLines.map((line, i) => {
    const num = i + 1;
    const hl = highlightLines.includes(num) ? 'highlight' : '';
    const escaped = line
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/  /g, '  ');
    return `<div class="code-line ${hl}"><span class="num">${String(num).padStart(2, '0')}</span><span class="code">${escaped}</span></div>`;
  }).join('');

  if (highlightLines.length > 0) {
    document.getElementById(containerId.replace('-code', '-line-indicator'))
      .textContent = `行 ${highlightLines.join(', ')}`;
  } else {
    document.getElementById(containerId.replace('-code', '-line-indicator'))
      .textContent = '行 —';
  }
}

function renderArray(containerId, arrayData, highlights = {}, pointerDefs = [], options = {}) {
  const container = document.getElementById(containerId);
  const cellAnim = highlights.cell !== undefined ? highlights.type || 'active' : '';
  const animClass = cellAnim ? ` ${cellAnim}` : '';
  const dimmedCells = highlights.dimmedCells || options.dimmedCells || new Set();
  const cellVal = (v) => v !== null && v !== undefined ? v : '';
  const isVertical = options.vertical;
  const isCircular = options.circular;

  container.classList.toggle('circular', Boolean(isCircular));

  if (isCircular) {
    const cellRadius = 34;
    const pointerRadius = 54;
    let html = '<div class="cells-ring">';
    html += arrayData.map((val, i) => {
      const angle = -Math.PI / 2 + (Math.PI * 2 * i) / arrayData.length;
      const x = 50 + Math.cos(angle) * cellRadius;
      const y = 50 + Math.sin(angle) * cellRadius;
      const isActive = highlights.cell === i ? animClass : '';
      const isDimmed = dimmedCells.has ? dimmedCells.has(i) : dimmedCells.includes(i);
      const isEmpty = val === null || val === undefined;
      return `<div class="cell${isEmpty ? ' empty' : ''}${isDimmed ? ' dimmed' : ''}${isActive}" data-index="${i}" style="--x:${x}%;--y:${y}%">
        <span class="value">${isEmpty ? '&nbsp;' : cellVal(val)}</span>
        <span class="index">${i}</span>
      </div>`;
    }).join('');

    const pointerCounts = pointerDefs.reduce((acc, p) => {
      acc[p.cellIndex] = (acc[p.cellIndex] || 0) + 1;
      return acc;
    }, {});
    const usedLayers = {};
    html += pointerDefs.map((p) => {
      if (p.cellIndex < 0 || p.cellIndex >= arrayData.length) return '';
      const layer = usedLayers[p.cellIndex] || 0;
      usedLayers[p.cellIndex] = layer + 1;
      const angle = -Math.PI / 2 + (Math.PI * 2 * p.cellIndex) / arrayData.length;
      const hasSharedCell = pointerCounts[p.cellIndex] > 1;
      const radius = pointerRadius + (hasSharedCell ? 0 : layer * 10);
      const tangentOffset = hasSharedCell ? (layer === 0 ? -10 : 10) : 0;
      const x = 50 + Math.cos(angle) * radius + (-Math.sin(angle) * tangentOffset);
      const y = 50 + Math.sin(angle) * radius + (Math.cos(angle) * tangentOffset);
      const rotation = angle * 180 / Math.PI + 90;
      return `<div class="ptr-group circular ${p.color || 'cobalt'}" style="left:${x}%;top:${y}%;--arrow-rotation:${rotation}deg">
        <div class="ptr-label">${p.label}: ${p.value}</div>
        <div class="ptr-arrow">▼</div>
      </div>`;
    }).join('');
    html += '</div>';
    container.innerHTML = html;
    return;
  }

  const gap = 10;

  // Render cells
  const flexStyle = isVertical
    ? 'display:flex;flex-direction:column-reverse;gap:' + gap + 'px;align-items:center;'
    : 'display:flex;gap:' + gap + 'px;justify-content:center;';
  let html = '<div class="cells-row" style="' + flexStyle + '">';
  html += arrayData.map((val, i) => {
    const isActive = highlights.cell === i ? animClass : '';
    const isDimmed = dimmedCells.has ? dimmedCells.has(i) : dimmedCells.includes(i);
    const isEmpty = val === null || val === undefined;
    return `<div class="cell${isEmpty ? ' empty' : ''}${isDimmed ? ' dimmed' : ''}${isActive}" data-index="${i}">
      <span class="value">${isEmpty ? '&nbsp;' : cellVal(val)}</span>
      <span class="index">${i}</span>
    </div>`;
  }).join('');
  html += '</div>';

  container.innerHTML = html;

  // Render pointer overlay on top of cells
  if (pointerDefs && pointerDefs.length > 0) {
    const overlay = document.createElement('div');
    overlay.className = 'pointer-overlay';

    // Measure container and compute cell positions
    requestAnimationFrame(() => {
      const containerRect = container.getBoundingClientRect();
      const cells = container.querySelectorAll('.cell');

      pointerDefs.forEach((p) => {
        if (p.cellIndex < 0 || p.cellIndex >= cells.length) return;
        const cell = cells[p.cellIndex];
        if (!cell) return;
        const cellRect = cell.getBoundingClientRect();

        const group = document.createElement('div');
        let cls = 'ptr-group ' + (p.color || 'cobalt');

        if (isVertical) {
          // Pointer on the right side of the cell, pointing left
          cls += ' right';
          const cellCenterY = cellRect.top - containerRect.top + cellRect.height / 2;
          const gapX = 12;
          group.style.left = (cellRect.right - containerRect.left + gapX) + 'px';
          group.style.top = cellCenterY + 'px';
          group.style.transform = 'translateY(-50%)';
          group.innerHTML = `
            <div class="ptr-label">${p.label}: ${p.value}</div>
            <div class="ptr-arrow">←</div>
          `;
        } else if (p.side === 'bottom') {
          cls += ' bottom';
          const cellCenterX = cellRect.left - containerRect.left + cellRect.width / 2;
          group.style.left = cellCenterX + 'px';
          group.style.bottom = '6px';
          group.innerHTML = `
            <div class="ptr-label">${p.label}: ${p.value}</div>
            <div class="ptr-arrow">▲</div>
          `;
        } else {
          const cellCenterX = cellRect.left - containerRect.left + cellRect.width / 2;
          group.style.left = cellCenterX + 'px';
          group.style.top = '6px';
          group.innerHTML = `
            <div class="ptr-arrow">▼</div>
            <div class="ptr-label">${p.label}: ${p.value}</div>
          `;
        }

        group.className = cls;
        overlay.appendChild(group);
      });
    });

    container.appendChild(overlay);
  }
}

function renderProgress(containerId, current, total) {
  const container = document.getElementById(containerId);
  if (total === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = Array.from({ length: total }, (_, i) => {
    let cls = 'progress-step';
    if (i < current) cls += ' done';
    else if (i === current) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('') + `<span class="progress-label">${Math.max(0, current + 1)} / ${total}</span>`;
}

function updateStackMeta(stack) {
  document.getElementById('stack-cap').textContent = stack.capacity;
}

function updateQueueMeta(queue) {
  document.getElementById('queue-size').textContent = queue.size;
  document.getElementById('queue-cap').textContent = queue.capacity;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ============================================================
//  Main Application
// ============================================================
let stack = createStack();
let queue = createQueue();
let lastStackOp = '';
let lastQueueOp = '';

const stackEngine = new StepEngine();
const queueEngine = new StepEngine();
let stackAnimating = false;
let queueAnimating = false;
let stackPlaybackMode = 'manual';
let queuePlaybackMode = 'manual';
let queueViewMode = 'linear';
let stackAutoTimer = null;
let queueAutoTimer = null;

function hasOperationInProgress(engine) {
  return engine.totalSteps() > 0 && engine.hasNext();
}

function updateModeButtons(prefix, mode) {
  const autoBtn = document.getElementById(`${prefix}-auto-mode-btn`);
  const manualBtn = document.getElementById(`${prefix}-manual-mode-btn`);
  if (!autoBtn || !manualBtn) return;
  autoBtn.classList.toggle('active', mode === 'auto');
  manualBtn.classList.toggle('active', mode === 'manual');
}

function updateQueueViewButtons() {
  const linearBtn = document.getElementById('queue-linear-view-btn');
  const circularBtn = document.getElementById('queue-circular-view-btn');
  if (!linearBtn || !circularBtn) return;
  linearBtn.classList.toggle('active', queueViewMode === 'linear');
  circularBtn.classList.toggle('active', queueViewMode === 'circular');
}

function clearStackAutoTimer() {
  if (stackAutoTimer) {
    clearTimeout(stackAutoTimer);
    stackAutoTimer = null;
  }
  stackAnimating = false;
}

function clearQueueAutoTimer() {
  if (queueAutoTimer) {
    clearTimeout(queueAutoTimer);
    queueAutoTimer = null;
  }
  queueAnimating = false;
}

function setStackPlaybackMode(mode) {
  if (stackAnimating || hasOperationInProgress(stackEngine)) return;
  stackPlaybackMode = mode;
  updateModeButtons('stack', mode);
  refreshStackDisplay(stackEngine.currentStep());
}

function setQueuePlaybackMode(mode) {
  if (queueAnimating || hasOperationInProgress(queueEngine)) return;
  queuePlaybackMode = mode;
  updateModeButtons('queue', mode);
  refreshQueueDisplay(queueEngine.currentStep());
}

function setQueueViewMode(mode) {
  queueViewMode = mode;
  updateQueueViewButtons();
  refreshQueueDisplay(queueEngine.currentStep());
}

function markStackCompleteIfNeeded() {
  if (stackEngine.totalSteps() > 0 && stackEngine.currentIndex() >= 0 && !stackEngine.hasNext()) {
    document.getElementById('stack-step-tag').textContent = '完成';
  }
}

function markQueueCompleteIfNeeded() {
  if (queueEngine.totalSteps() > 0 && queueEngine.currentIndex() >= 0 && !queueEngine.hasNext()) {
    document.getElementById('queue-step-tag').textContent = '完成';
  }
}

// -- Stack rendering helper --
function refreshStackDisplay(step) {
  const highlights = {};
  if (step && step.animCell !== undefined) {
    highlights.cell = step.animCell;
    highlights.type = step.animType || 'active';
  }
  highlights.dimmedCells = stack.removed;
  renderArray('stack-array', stack.array, highlights, [
    { cellIndex: stack.top >= 0 ? stack.top : 0, label: 'top', value: stack.top, color: 'cobalt' },
  ], { vertical: true });
  updateStackMeta(stack);

  // info banner
  const tag = document.getElementById('stack-step-tag');
  const msg = document.getElementById('stack-msg');
  if (step) {
    tag.textContent = step.tag || '步骤';
    msg.innerHTML = step.desc;
    if (step.popVal !== undefined) {
      msg.innerHTML += ` &nbsp;→ 弹出值: <span class="hl">${step.popVal}</span>`;
    }
    if (step.peekVal !== undefined) {
      msg.innerHTML += ` &nbsp;→ 栈顶: <span class="hl">${step.peekVal}</span>`;
    }
  }

  const stackLocked = stackAnimating || hasOperationInProgress(stackEngine);
  document.getElementById('stack-step-back-btn').disabled = !stackEngine.hasPrev() || stackAnimating;
  document.getElementById('stack-step-fwd-btn').disabled = !stackEngine.hasNext() || stackAnimating;
  document.getElementById('stack-push-btn').disabled = stackLocked;
  document.getElementById('stack-pop-btn').disabled = stackLocked;
  document.getElementById('stack-peek-btn').disabled = stackLocked;
  document.getElementById('stack-reset-btn').disabled = false;
  document.getElementById('stack-auto-mode-btn').disabled = stackLocked;
  document.getElementById('stack-manual-mode-btn').disabled = stackLocked;
  updateModeButtons('stack', stackPlaybackMode);

  renderProgress('stack-progress', stackEngine.currentIndex(), stackEngine.totalSteps());
  renderCode('stack-code', STACK_CODE, step ? step.lines : []);
}

// -- Queue rendering helper --
function refreshQueueDisplay(step) {
  const highlights = {};
  if (step && step.animCell !== undefined) {
    highlights.cell = step.animCell;
    highlights.type = step.animType || 'active';
  }
  highlights.dimmedCells = queue.removed;
  renderArray('queue-array', queue.array, highlights, [
    { cellIndex: queue.front, label: 'front', value: queue.front, color: 'cobalt' },
    { cellIndex: queue.rear, label: 'rear', value: queue.rear, color: 'orange', side: 'bottom' },
  ], { circular: queueViewMode === 'circular' });
  updateQueueMeta(queue);
  updateQueueViewButtons();

  const tag = document.getElementById('queue-step-tag');
  const msg = document.getElementById('queue-msg');
  if (step) {
    tag.textContent = step.tag || '步骤';
    msg.innerHTML = step.desc;
    if (step.deqVal !== undefined) {
      msg.innerHTML += ` &nbsp;→ 出队值: <span class="hl">${step.deqVal}</span>`;
    }
    if (step.peekVal !== undefined) {
      msg.innerHTML += ` &nbsp;→ 队首: <span class="hl">${step.peekVal}</span>`;
    }
  }

  const queueLocked = queueAnimating || hasOperationInProgress(queueEngine);
  document.getElementById('queue-step-back-btn').disabled = !queueEngine.hasPrev() || queueAnimating;
  document.getElementById('queue-step-fwd-btn').disabled = !queueEngine.hasNext() || queueAnimating;
  document.getElementById('queue-enq-btn').disabled = queueLocked;
  document.getElementById('queue-deq-btn').disabled = queueLocked;
  document.getElementById('queue-peek-btn').disabled = queueLocked;
  document.getElementById('queue-reset-btn').disabled = false;
  document.getElementById('queue-auto-mode-btn').disabled = queueLocked;
  document.getElementById('queue-manual-mode-btn').disabled = queueLocked;
  updateModeButtons('queue', queuePlaybackMode);

  renderProgress('queue-progress', queueEngine.currentIndex(), queueEngine.totalSteps());
  renderCode('queue-code', QUEUE_CODE, step ? step.lines : []);
}

// -- Stack engine listener --
stackEngine.onNotify((engine) => {
  refreshStackDisplay(engine.currentStep());
});

queueEngine.onNotify((engine) => {
  refreshQueueDisplay(engine.currentStep());
});

// -- Stack operations --
function startStackOperation(steps, readyMessage, previewLines = []) {
  if (stackAnimating || hasOperationInProgress(stackEngine)) return;
  clearStackAutoTimer();
  stackEngine.load(steps);

  if (stackPlaybackMode === 'manual') {
    refreshStackDisplay({
      tag: '待执行',
      desc: readyMessage,
      lines: previewLines,
      action: () => {},
      revert: () => {},
    });
    return;
  }

  stackAnimating = true;
  refreshStackDisplay(null);
  runStackAuto();
}

function runStackAuto() {
  const step = stackEngine.next();
  if (!step) {
    stackAnimating = false;
    refreshStackDisplay(stackEngine.currentStep());
    markStackCompleteIfNeeded();
    return;
  }

  if (stackEngine.hasNext()) {
    stackAutoTimer = setTimeout(runStackAuto, AUTO_STEP_DELAY_MS);
    return;
  }

  stackAutoTimer = setTimeout(() => {
    stackAnimating = false;
    stackAutoTimer = null;
    refreshStackDisplay(stackEngine.currentStep());
    markStackCompleteIfNeeded();
  }, AUTO_STEP_DELAY_MS);
}

function stackPush() {
  if (stackAnimating || hasOperationInProgress(stackEngine)) return;
  const input = document.getElementById('stack-input');
  const val = parseInt(input.value, 10);
  if (isNaN(val)) { showToast('请输入有效数字'); return; }

  const steps = generateStackPushSteps(stack, val);
  if (steps.length <= 0) return;

  lastStackOp = `push(${val})`;
  startStackOperation(steps, `${lastStackOp} 已载入，使用 ▶ 逐步执行。`, [11]);
}

function stackPop() {
  if (stackAnimating || hasOperationInProgress(stackEngine)) return;
  const steps = generateStackPopSteps(stack);
  if (steps.length <= 0) return;
  lastStackOp = 'pop()';
  startStackOperation(steps, `${lastStackOp} 已载入，使用 ▶ 逐步执行。`, [20]);
}

function stackPeek() {
  if (stackAnimating || hasOperationInProgress(stackEngine)) return;
  const steps = generateStackPeekSteps(stack);
  if (steps.length <= 0) return;
  lastStackOp = 'peek()';
  startStackOperation(steps, `${lastStackOp} 已载入，使用 ▶ 逐步执行。`, [29]);
}

function stackStepFwd() {
  if (stackAnimating || !stackEngine.hasNext()) return;
  const step = stackEngine.next();
  if (step) {
    refreshStackDisplay(stackEngine.currentStep());
    markStackCompleteIfNeeded();
  }
}

function stackStepBack() {
  if (stackAnimating) return;
  stackEngine.back();
  refreshStackDisplay(stackEngine.currentStep());
}

function stackReset() {
  clearStackAutoTimer();
  stack = createStack();
  lastStackOp = 'reset';
  stackEngine.load([]);
  refreshStackDisplay(null);
  document.getElementById('stack-step-tag').textContent = '就绪';
  document.getElementById('stack-msg').textContent = '已重置，点击 Push 或 Pop 开始演示';
}

// -- Queue operations --
function startQueueOperation(steps, readyMessage, previewLines = []) {
  if (queueAnimating || hasOperationInProgress(queueEngine)) return;
  clearQueueAutoTimer();
  queueEngine.load(steps);

  if (queuePlaybackMode === 'manual') {
    refreshQueueDisplay({
      tag: '待执行',
      desc: readyMessage,
      lines: previewLines,
      action: () => {},
      revert: () => {},
    });
    return;
  }

  queueAnimating = true;
  refreshQueueDisplay(null);
  runQueueAuto();
}

function runQueueAuto() {
  const step = queueEngine.next();
  if (!step) {
    queueAnimating = false;
    refreshQueueDisplay(queueEngine.currentStep());
    markQueueCompleteIfNeeded();
    return;
  }

  if (queueEngine.hasNext()) {
    queueAutoTimer = setTimeout(runQueueAuto, AUTO_STEP_DELAY_MS);
    return;
  }

  queueAutoTimer = setTimeout(() => {
    queueAnimating = false;
    queueAutoTimer = null;
    refreshQueueDisplay(queueEngine.currentStep());
    markQueueCompleteIfNeeded();
  }, AUTO_STEP_DELAY_MS);
}

function queueEnqueue() {
  if (queueAnimating || hasOperationInProgress(queueEngine)) return;
  const input = document.getElementById('queue-input');
  const val = parseInt(input.value, 10);
  if (isNaN(val)) { showToast('请输入有效数字'); return; }

  const steps = generateQueueEnqSteps(queue, val);
  if (steps.length <= 0) return;
  lastQueueOp = `enqueue(${val})`;
  startQueueOperation(steps, `${lastQueueOp} 已载入，使用 ▶ 逐步执行。`, [12]);
}

function queueDequeue() {
  if (queueAnimating || hasOperationInProgress(queueEngine)) return;
  const steps = generateQueueDeqSteps(queue);
  if (steps.length <= 0) return;
  lastQueueOp = 'dequeue()';
  startQueueOperation(steps, `${lastQueueOp} 已载入，使用 ▶ 逐步执行。`, [20]);
}

function queuePeek() {
  if (queueAnimating || hasOperationInProgress(queueEngine)) return;
  const steps = generateQueuePeekSteps(queue);
  if (steps.length <= 0) return;
  lastQueueOp = 'peek()';
  startQueueOperation(steps, `${lastQueueOp} 已载入，使用 ▶ 逐步执行。`, [29]);
}

function queueStepFwd() {
  if (queueAnimating || !queueEngine.hasNext()) return;
  const step = queueEngine.next();
  if (step) {
    refreshQueueDisplay(queueEngine.currentStep());
    markQueueCompleteIfNeeded();
  }
}

function queueStepBack() {
  if (queueAnimating) return;
  queueEngine.back();
  refreshQueueDisplay(queueEngine.currentStep());
}

function queueReset() {
  clearQueueAutoTimer();
  queue = createQueue();
  lastQueueOp = 'reset';
  queueEngine.load([]);
  refreshQueueDisplay(null);
  document.getElementById('queue-step-tag').textContent = '就绪';
  document.getElementById('queue-msg').textContent = '已重置，点击 Enqueue 或 Dequeue 开始演示';
}

// ============================================================
//  Initialization
// ============================================================
function init() {
  // Render code
  renderCode('stack-code', STACK_CODE, []);
  renderCode('queue-code', QUEUE_CODE, []);

  // Render arrays with pointer overlay
  renderArray('stack-array', stack.array, {}, [
    { cellIndex: 0, label: 'top', value: stack.top, color: 'cobalt' },
  ], { vertical: true });
  updateStackMeta(stack);

  renderArray('queue-array', queue.array, {}, [
    { cellIndex: 0, label: 'front', value: queue.front, color: 'cobalt' },
    { cellIndex: 0, label: 'rear', value: queue.rear, color: 'orange', side: 'bottom' },
  ], { circular: queueViewMode === 'circular' });
  updateQueueMeta(queue);
  updateQueueViewButtons();

  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.remove('active');
        t.setAttribute('aria-selected', 'false');
      });
      tab.classList.add('active');
      tab.setAttribute('aria-selected', 'true');
      document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  // Stack event listeners
  document.getElementById('stack-push-btn').addEventListener('click', stackPush);
  document.getElementById('stack-pop-btn').addEventListener('click', stackPop);
  document.getElementById('stack-peek-btn').addEventListener('click', stackPeek);
  document.getElementById('stack-reset-btn').addEventListener('click', stackReset);
  document.getElementById('stack-step-fwd-btn').addEventListener('click', stackStepFwd);
  document.getElementById('stack-step-back-btn').addEventListener('click', stackStepBack);
  document.getElementById('stack-auto-mode-btn').addEventListener('click', () => setStackPlaybackMode('auto'));
  document.getElementById('stack-manual-mode-btn').addEventListener('click', () => setStackPlaybackMode('manual'));
  document.getElementById('stack-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') stackPush();
  });

  // Queue event listeners
  document.getElementById('queue-enq-btn').addEventListener('click', queueEnqueue);
  document.getElementById('queue-deq-btn').addEventListener('click', queueDequeue);
  document.getElementById('queue-peek-btn').addEventListener('click', queuePeek);
  document.getElementById('queue-reset-btn').addEventListener('click', queueReset);
  document.getElementById('queue-step-fwd-btn').addEventListener('click', queueStepFwd);
  document.getElementById('queue-step-back-btn').addEventListener('click', queueStepBack);
  document.getElementById('queue-auto-mode-btn').addEventListener('click', () => setQueuePlaybackMode('auto'));
  document.getElementById('queue-manual-mode-btn').addEventListener('click', () => setQueuePlaybackMode('manual'));
  document.getElementById('queue-linear-view-btn').addEventListener('click', () => setQueueViewMode('linear'));
  document.getElementById('queue-circular-view-btn').addEventListener('click', () => setQueueViewMode('circular'));
  document.getElementById('queue-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') queueEnqueue();
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    const activeTab = document.querySelector('.tab.active');
    const tab = activeTab ? activeTab.dataset.tab : 'stack';
    const typingTarget = e.target.matches('input, textarea, select') || e.target.isContentEditable;
    if (typingTarget) return;

    switch(e.key) {
      case '1': document.querySelector('[data-tab="stack"]').click(); break;
      case '2': document.querySelector('[data-tab="queue"]').click(); break;
      case 'ArrowLeft':
        e.preventDefault();
        if (tab === 'stack') stackStepBack();
        else queueStepBack();
        break;
      case 'ArrowRight':
        e.preventDefault();
        if (tab === 'stack') stackStepFwd();
        else queueStepFwd();
        break;
    }
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
